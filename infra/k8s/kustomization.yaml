apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mms
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - minio.yaml
  - mlflow.yaml
  - model-serve.yaml
# Default to GHCR so a fresh cluster can boot without a local image import step.
# CI can still override tags during rollout.
images:
  - name: mealie-model-serve-mlflow
    newName: ghcr.io/mealie-enrs/mealie-model-serve-mlflow
    newTag: latest
  - name: mealie-model-serve-api
    newName: ghcr.io/mealie-enrs/mealie-model-serve-api
    newTag: latest
# Optional (private GHCR): add after creating Secret ghcr-pull in mms:
#   - path: patches/ghcr-imagepull.yaml
patches:
  - target:
      kind: Deployment
      name: mms-mlflow
      namespace: mms
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: mms-model-serve
      namespace: mms
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
