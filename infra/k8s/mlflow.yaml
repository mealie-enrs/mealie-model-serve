apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mms
spec:
  type: NodePort
  selector:
    app: mms-mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mms-mlflow
  namespace: mms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mms-mlflow
  template:
    metadata:
      labels:
        app: mms-mlflow
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
        - name: wait-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio 9000; do sleep 2; done
      containers:
        - name: mlflow
          image: ghcr.io/your-org/mealie-model-serve-mlflow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: mms-secrets
                  key: MLFLOW_BACKEND_STORE_URI
            - name: MLFLOW_ARTIFACTS_DESTINATION
              valueFrom:
                configMapKeyRef:
                  name: mms-config
                  key: MLFLOW_ARTIFACTS_DESTINATION
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: mms-config
                  key: MLFLOW_S3_ENDPOINT_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mms-secrets
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mms-secrets
                  key: MINIO_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
