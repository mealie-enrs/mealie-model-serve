# Strategic merge: overrides mms-config for Chameleon S3 (Swift container = S3 bucket).
# Replace proj26-obj-store if you use a different Swift container name.
#
# Artifact root: s3://<container>/serving/mlflow-artifacts
# MLflow will create run paths under that prefix, e.g.:
#   serving/mlflow-artifacts/<experiment_id>/<run_id>/artifacts/...
apiVersion: v1
kind: ConfigMap
metadata:
  name: mms-config
  namespace: mms
data:
  MLFLOW_ARTIFACTS_DESTINATION: "s3://proj26-obj-store/serving/mlflow-artifacts"
  MLFLOW_S3_ENDPOINT_URL: "https://chi.uc.chameleoncloud.org:7480"
  MINIO_BUCKET: "proj26-obj-store"
