# Pod CIDR on this k3s node cannot reach Chameleon :7480; host network can.
# ClusterFirstWithHostNet keeps Service DNS (postgres, mlflow) working.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mms-mlflow
  namespace: mms
spec:
  template:
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mms-model-serve
  namespace: mms
spec:
  template:
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mms-seed-toy-model
  namespace: mms
spec:
  template:
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
