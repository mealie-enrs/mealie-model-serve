# Copy to mms-secrets.yaml (gitignored), edit, then: kubectl apply -f mms-secrets.yaml
#
# MinIO (default overlay): MINIO_ROOT_* are the MinIO user/password.
#
# Chameleon S3 overlay: reuse the same keys but set EC2/S3 credentials from OpenStack:
#   openstack ec2 credentials create
# Put Access in MINIO_ROOT_USER and Secret in MINIO_ROOT_PASSWORD (boto3 reads AWS_* from these env mappings in the Deployments).
apiVersion: v1
kind: Secret
metadata:
  name: mms-secrets
  namespace: mms
type: Opaque
stringData:
  DATABASE_PASSWORD: "change-me-mlflow-db"
  MINIO_ROOT_USER: "mmsminio"
  MINIO_ROOT_PASSWORD: "change-me-minio-root"
  MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow:change-me-mlflow-db@postgres:5432/mlflow"
