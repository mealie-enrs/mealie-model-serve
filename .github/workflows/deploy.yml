# Build Docker images → push to GHCR → roll out on your k3s VM over SSH.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          e.g. 192.5.86.170
#   SSH_USER          e.g. cc
#   SSH_PRIVATE_KEY   PEM for that user (full key including BEGIN/END lines)
#
# Optional:
#   GHCR_PULL_TOKEN      PAT with read:packages if images are private (creates secret ghcr-pull in mms).
#   GHCR_PULL_USERNAME   GitHub username for that PAT (default: lowercase repo owner — same as GHCR path).
#
# Prerequisite on the cluster: MMS workloads already applied once (kubectl apply -k …).
# This workflow only updates image digests for the two app deployments.
#
name: Build and deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_MLFLOW: mealie-model-serve-mlflow
  IMAGE_API: mealie-model-serve-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Registry metadata
        id: meta
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mlflow
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_MLFLOW }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_MLFLOW }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serving
          build-args: |
            GIT_SHA=${{ github.sha }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Do not interpolate SSH_PRIVATE_KEY into a `run:` script — multiline keys break bash and look "empty".
      - name: Check SSH host and user
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          missing=
          [ -z "$SSH_HOST" ] && missing="${missing} SSH_HOST"
          [ -z "$SSH_USER" ] && missing="${missing} SSH_USER"
          if [ -n "$missing" ]; then
            echo "::error::Add repository secrets (Settings → Secrets and variables → Actions):$missing"
            exit 1
          fi
      - name: Check SSH private key secret exists
        if: ${{ secrets.SSH_PRIVATE_KEY == '' }}
        run: |
          echo "::error::Add repository secret SSH_PRIVATE_KEY (full multiline OpenSSH private key)"
          exit 1

      - name: Deploy via SSH (kubectl set image)
        uses: appleboy/ssh-action@v1.2.0
        env:
          OWNER_LC: ${{ needs.build-and-push.outputs.owner_lc }}
          TAG: ${{ needs.build-and-push.outputs.tag }}
          NS: mms
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: OWNER_LC,TAG,NS,GHCR_PULL_TOKEN,GHCR_PULL_USERNAME
          script: |
            set -euo pipefail
            REG="ghcr.io/${OWNER_LC}"
            API_IMG="${REG}/mealie-model-serve-api:${TAG}"
            MLF_IMG="${REG}/mealie-model-serve-mlflow:${TAG}"
            DOCKER_USER="${GHCR_PULL_USERNAME:-$OWNER_LC}"

            # Private GHCR: create pull secret (add imagePullSecrets to both Deployments once — see DEPLOY.md).
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              sudo k3s kubectl create secret docker-registry ghcr-pull \
                --docker-server=ghcr.io \
                --docker-username="${DOCKER_USER}" \
                --docker-password="${GHCR_PULL_TOKEN}" \
                -n "${NS}" --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            fi

            sudo k3s kubectl set image deployment/mms-mlflow mlflow="${MLF_IMG}" -n "${NS}"
            sudo k3s kubectl set image deployment/mms-model-serve model-serve="${API_IMG}" -n "${NS}"

            sudo k3s kubectl rollout status deployment/mms-mlflow -n "${NS}" --timeout=400s
            sudo k3s kubectl rollout status deployment/mms-model-serve -n "${NS}" --timeout=400s
